version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: picks-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: picks_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - picks-network

  redis:
    image: redis:7-alpine
    container_name: picks-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - picks-network

  # Uncomment to run the admin in Docker
  # admin:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: picks-admin
  #   environment:
  #     - APP=admin
  #     - DATABASE_URL=postgresql://postgres:password@postgres:5432/picks_db?schema=public
  #     - REDIS_HOST=redis
  #     - REDIS_PORT=6379
  #   ports:
  #     - '3001:3001'
  #   depends_on:
  #     - postgres
  #     - redis
  #   networks:
  #     - picks-network

  # Uncomment to run the user in Docker
  # user:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: picks-user
  #   environment:
  #     - APP=user
  #     - DATABASE_URL=postgresql://postgres:password@postgres:5432/picks_db?schema=public
  #     - REDIS_HOST=redis
  #     - REDIS_PORT=6379
  #   ports:
  #     - '3002:3002'
  #   depends_on:
  #     - postgres
  #     - redis
  #   networks:
  #     - picks-network

volumes:
  postgres_data:
  redis_data:

networks:
  picks-network:
    driver: bridge
